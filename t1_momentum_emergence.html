<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>p×t → Toroid</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }
  body { background:#000; color:#fff; font-family:'Courier New',monospace; overflow:hidden; width:100vw; height:100vh; }
  canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:1; }

  #ui {
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(0,0,0,0.88);
    padding:10px 14px 8px;
    display:flex; flex-direction:column; gap:5px;
    pointer-events:all;
  }
  #title { font-size:11px; color:#0ff; letter-spacing:2px; }

  .row { display:flex; align-items:center; gap:10px; }
  .lbl { font-size:11px; color:#fa0; width:28px; flex-shrink:0; }
  input[type=range] {
    flex:1; height:22px; accent-color:#0ff;
    -webkit-appearance:none; background:transparent; cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height:4px; background:#1a4060; border-radius:2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:26px; height:26px;
    border-radius:50%; background:#0ff; cursor:pointer; margin-top:-11px;
  }
  .val { font-size:12px; color:#0ff; width:40px; text-align:right; flex-shrink:0; }

  #phase_display {
    font-size:13px; letter-spacing:1px; text-align:center;
    padding:4px 0 2px;
    border-top: 1px solid #0ff2;
    margin-top:2px;
  }

  #eq_display {
    font-size:11px; color:#fa0; text-align:center;
    letter-spacing:1px; min-height:16px;
  }

  #bottom {
    position:fixed; bottom:0; left:0; right:0; z-index:100;
    background:rgba(0,0,0,0.88);
    padding:7px 14px 8px;
    display:flex; flex-direction:column; gap:3px;
    pointer-events:none;
  }
  .bl { font-size:10px; letter-spacing:1px; }

  #btns {
    display:flex; gap:8px; justify-content:center;
    pointer-events:all;
  }
  button {
    background:transparent; border:1px solid #0ff4; color:#0ff;
    font-family:'Courier New',monospace; font-size:10px;
    padding:6px 14px; letter-spacing:1px; cursor:pointer;
    text-transform:uppercase; transition:all 0.2s;
    pointer-events:all;
  }
  button.active { background:#0ff; color:#000; border-color:#0ff; }
  button:active { transform:scale(0.96); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="title">MOMENTUM → GEOMETRY — T=c STRING</div>
  <div class="row">
    <div class="lbl">p</div>
    <input type="range" id="sl_p" min="1" max="30" step="1" value="12">
    <div class="val" id="v_p">12</div>
  </div>
  <div id="btns">
    <button id="b0" onclick="setPhase(0)" class="active">p×t</button>
    <button id="b1" onclick="setPhase(1)">+x²</button>
    <button id="b2" onclick="setPhase(2)">+x(x+1)</button>
    <button id="b3" onclick="setPhase(3)">BEAT</button>
  </div>
  <div id="phase_display">—</div>
  <div id="eq_display">—</div>
</div>

<div id="bottom">
  <div class="bl" style="color:#888; text-align:center">
    p×t = straight line &nbsp;|&nbsp; +x² = parabola &nbsp;|&nbsp; +x(x+1) = closure
  </div>
  <div class="bl" style="color:#f0f; text-align:center" id="beat_line"> </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', resize);

let p = 12;
let phase = 0;
let t = 0;
let trailPts = [];
let closureCount = 0;
let beatVisible = false;
let beatAlpha = 0;

const slP = document.getElementById('sl_p');
slP.addEventListener('input', function() {
  p = parseInt(this.value);
  document.getElementById('v_p').textContent = p;
  reset();
});

function setPhase(n) {
  phase = n;
  document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  document.getElementById('b'+n).classList.add('active');
  reset();
}

function reset() {
  t = 0; trailPts = []; closureCount = 0; beatVisible = false; beatAlpha = 0;
}

// Phase descriptions
const phaseNames = [
  'PHASE 1 — p × t',
  'PHASE 2 — p × t + x²',
  'PHASE 3 — p × t + x(x+1)',
  'PHASE 4 — BEAT EMERGES'
];
const phaseEqs = [
  'θ(t) = p × t     →  straight line, open path',
  'θ(t) = p × t + x²  →  parabola, still open',
  'θ(t) = p × t + x(x+1)  →  +1 closes the loop',
  'inner 24° | outer 30° | beat 6° = π/30'
];
const phaseColors = ['#0ff','#fa0','#0f8','#f0f'];

// Compute path point based on phase
function getPoint(tVal, pVal, phaseN) {
  const sc = Math.min(W,H) * 0.28;
  const x = pVal; // winding number

  if (phaseN === 0) {
    // p×t — straight line momentum, just a rotating vector
    const angle = tVal * pVal * 0.05;
    return {
      px: cx + sc * 0.6 * Math.cos(angle),
      py: cy + sc * 0.6 * Math.sin(angle),
      open: true
    };
  }

  if (phaseN === 1) {
    // p×t + x² — parabolic curve, spirals but doesn't close
    // x² gives flat space Laplacian — path curves but can't close
    const angle = tVal * pVal * 0.05;
    const r = sc * 0.5 * (1 - 0.3 * Math.cos(tVal * 0.02));
    // With x² the radius oscillates but drifts — simulate open spiral
    const drift = tVal * 0.008;
    return {
      px: cx + (sc * 0.55 + drift * 8) * Math.cos(angle) * Math.cos(tVal*0.015),
      py: cy + (sc * 0.55 + drift * 8) * Math.sin(angle) * Math.cos(tVal*0.015),
      open: true
    };
  }

  if (phaseN === 2 || phaseN === 3) {
    // p×t + x(x+1) — the +1 curvature term closes the path onto torus
    // Torus parameterization with single Δ
    const delta = (pVal / 30) * Math.PI * 2 / 15; // maps p to a beat angle
    const R = sc * 0.55, r = sc * 0.22;
    const tor = tVal * delta;
    const pol = tVal * delta; // X=Y=Δ single momentum
    return {
      px: cx + (R + r * Math.cos(pol)) * Math.cos(tor) * 0.85,
      py: cy + (R + r * Math.cos(pol)) * Math.sin(tor) * 0.85 * 0.55,
      rTor: tor, rPol: pol,
      R, r, open: false
    };
  }
}

// 3d torus projection for phase 2/3
function torusProj(tor, pol, R, r, rotX, rotY) {
  const x = (R + r*Math.cos(pol)) * Math.cos(tor);
  const y = (R + r*Math.cos(pol)) * Math.sin(tor);
  const z = r * Math.sin(pol);
  let rx = x*Math.cos(rotY) + z*Math.sin(rotY);
  let rz = -x*Math.sin(rotY) + z*Math.cos(rotY);
  let ry = y;
  let ry2 = ry*Math.cos(rotX) - rz*Math.sin(rotX);
  let rz2 = ry*Math.sin(rotX) + rz*Math.cos(rotX);
  const fov = 500;
  const s = fov/(fov + rz2 + R*0.3);
  return { sx: cx + rx*s, sy: cy + ry2*s*0.8, depth: rz2, s };
}

let rotY = 0;

function draw() {
  ctx.clearRect(0,0,W,H);

  const sc = Math.min(W,H) * 0.28;
  rotY += 0.008;
  const rotX = -0.35;

  // Update UI
  document.getElementById('phase_display').textContent = phaseNames[phase];
  document.getElementById('phase_display').style.color = phaseColors[phase];
  document.getElementById('eq_display').textContent = phaseEqs[phase];

  if (phase === 0) {
    // ---- PHASE 0: pure p×t — show momentum arrow rotating ----
    const angle = t * p * 0.04;
    const len = sc * 0.55;

    // Faint circle showing orbit
    ctx.beginPath();
    ctx.arc(cx, cy, len, 0, Math.PI*2);
    ctx.strokeStyle = '#0ff1'; ctx.lineWidth=1; ctx.stroke();

    // Trail
    trailPts.push({x: cx + len*Math.cos(angle), y: cy + len*Math.sin(angle)});
    if (trailPts.length > 80) trailPts.shift();
    for(let i=1; i<trailPts.length; i++) {
      const a = i/trailPts.length;
      ctx.beginPath();
      ctx.moveTo(trailPts[i-1].x, trailPts[i-1].y);
      ctx.lineTo(trailPts[i].x, trailPts[i].y);
      ctx.strokeStyle = `rgba(0,255,255,${a*0.6})`;
      ctx.lineWidth=2; ctx.stroke();
    }

    // Momentum arrow
    const ex = cx + len*Math.cos(angle);
    const ey = cy + len*Math.sin(angle);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle='#0ff'; ctx.lineWidth=2.5; ctx.stroke();

    // Arrow head
    const ah = 12;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - ah*Math.cos(angle-0.4), ey - ah*Math.sin(angle-0.4));
    ctx.lineTo(ex - ah*Math.cos(angle+0.4), ey - ah*Math.sin(angle+0.4));
    ctx.closePath(); ctx.fillStyle='#0ff'; ctx.fill();

    // Labels
    ctx.fillStyle='#0ff'; ctx.font='bold 14px Courier New'; ctx.textAlign='center';
    ctx.fillText('p = '+p, cx, cy - len - 20);
    ctx.fillStyle='#fa0'; ctx.font='12px Courier New';
    ctx.fillText('t = '+(t*0.04).toFixed(1)+'π', cx, cy + len + 30);

    // p label on arrow midpoint
    ctx.fillStyle='#fff'; ctx.font='11px Courier New';
    ctx.fillText('→ p×t', cx + len*0.5*Math.cos(angle) + 12, cy + len*0.5*Math.sin(angle));
    ctx.textAlign='left';

    document.getElementById('beat_line').textContent = 'one momentum, one direction — no torus yet';

  } else if (phase === 1) {
    // ---- PHASE 1: p×t + x² — spiraling parabola, open ----
    const delta = (p/30) * 0.15;
    trailPts.push({
      x: cx + (sc*0.5 + Math.sin(t*0.03)*sc*0.15) * Math.cos(t*delta),
      y: cy + (sc*0.5 + Math.sin(t*0.03)*sc*0.15) * Math.sin(t*delta) * 0.6
    });
    if (trailPts.length > 200) trailPts.shift();

    for(let i=1; i<trailPts.length; i++) {
      const a = i/trailPts.length;
      ctx.beginPath();
      ctx.moveTo(trailPts[i-1].x, trailPts[i-1].y);
      ctx.lineTo(trailPts[i].x, trailPts[i].y);
      ctx.strokeStyle = `rgba(255,160,0,${a*0.7})`;
      ctx.lineWidth=2; ctx.stroke();
    }

    // Current point
    const cp = trailPts[trailPts.length-1];
    ctx.beginPath(); ctx.arc(cp.x, cp.y, 6, 0, Math.PI*2);
    ctx.fillStyle='#fa0'; ctx.fill();

    // x² label
    ctx.fillStyle='#fa0'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
    ctx.fillText('x² = flat Laplacian', cx, cy - sc*0.75);
    ctx.fillStyle='#f44'; ctx.font='11px Courier New';
    ctx.fillText('path curves but cannot close', cx, cy - sc*0.75 + 20);
    ctx.textAlign='left';

    document.getElementById('beat_line').textContent = 'x² bends the path — but no closure';

  } else if (phase === 2) {
    // ---- PHASE 2: p×t + x(x+1) — torus emerges ----
    const delta = (p/30) * Math.PI*2/30;
    const R = sc*0.52, r = sc*0.2;

    // Build trail on torus
    const tor = t * delta;
    const pol = t * delta; // X=Y locked
    const pt = torusProj(tor, pol, R, r, rotX, rotY);
    trailPts.push({...pt, tor, pol});
    if (trailPts.length > 400) trailPts.shift();

    // Faint torus surface
    ctx.globalAlpha=0.06;
    const TU=24, TV=12;
    for(let i=0;i<TU;i++){
      const u1=(i/TU)*Math.PI*2, u2=((i+1)/TU)*Math.PI*2;
      for(let j=0;j<TV;j++){
        const v1=(j/TV)*Math.PI*2, v2=((j+1)/TV)*Math.PI*2;
        const a=torusProj(u1,v1,R,r,rotX,rotY);
        const b=torusProj(u2,v1,R,r,rotX,rotY);
        const c=torusProj(u2,v2,R,r,rotX,rotY);
        const d=torusProj(u1,v2,R,r,rotX,rotY);
        ctx.beginPath();
        ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy);
        ctx.lineTo(c.sx,c.sy); ctx.lineTo(d.sx,d.sy);
        ctx.closePath(); ctx.fillStyle='#0a2030'; ctx.fill();
      }
    }
    ctx.globalAlpha=1;

    // Draw trail
    for(let i=1; i<trailPts.length; i++) {
      const a = i/trailPts.length;
      ctx.beginPath();
      ctx.moveTo(trailPts[i-1].sx, trailPts[i-1].sy);
      ctx.lineTo(trailPts[i].sx, trailPts[i].sy);
      ctx.strokeStyle = `rgba(0,248,0,${a*0.85})`;
      ctx.lineWidth=2.5; ctx.stroke();
    }

    // Current point
    ctx.beginPath(); ctx.arc(pt.sx, pt.sy, 6, 0, Math.PI*2);
    ctx.fillStyle='#0f8'; ctx.fill();

    // +1 label
    ctx.fillStyle='#0f8'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
    ctx.fillText('+1 curvature term closes the loop', cx, cy - sc*0.85);
    ctx.fillStyle='#fff'; ctx.font='11px Courier New';
    ctx.fillText('x(x+1) = x² + x  ←  the +1 is closure', cx, cy - sc*0.85 + 20);
    ctx.textAlign='left';

    // Check closure — count loops
    if (trailPts.length > 10) {
      const first = trailPts[0];
      const last = trailPts[trailPts.length-1];
      const dist = Math.hypot(last.sx-first.sx, last.sy-first.sy);
      if (dist < 12 && trailPts.length > 50 && t > 30) {
        closureCount++;
        if (closureCount > 5) {
          // Show closure flash
          ctx.fillStyle='rgba(0,248,0,0.15)';
          ctx.beginPath(); ctx.arc(cx,cy,sc*0.8,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#0f8'; ctx.font='bold 15px Courier New'; ctx.textAlign='center';
          ctx.fillText('CLOSED ✓', cx, cy);
          ctx.textAlign='left';
        }
      }
    }

    document.getElementById('beat_line').textContent = '+1 from parabolic curvature = closure';

  } else if (phase === 3) {
    // ---- PHASE 3: BEAT — show the invariant angles ----
    const delta = (p/30) * Math.PI*2/30;
    const R = sc*0.52, r = sc*0.2;

    // Full torus winding
    const STEPS = 500;
    const allPts = [];
    for(let i=0; i<=STEPS; i++) {
      const frac = i/STEPS;
      const tor = frac * Math.PI*4;
      const pol = frac * Math.PI*4;
      allPts.push(torusProj(tor, pol, R, r, rotX, rotY));
    }

    // Faint torus
    ctx.globalAlpha=0.07;
    const TU=24, TV=12;
    for(let i=0;i<TU;i++){
      const u1=(i/TU)*Math.PI*2, u2=((i+1)/TU)*Math.PI*2;
      for(let j=0;j<TV;j++){
        const v1=(j/TV)*Math.PI*2, v2=((j+1)/TV)*Math.PI*2;
        const a=torusProj(u1,v1,R,r,rotX,rotY);
        const b=torusProj(u2,v1,R,r,rotX,rotY);
        const c2=torusProj(u2,v2,R,r,rotX,rotY);
        const d=torusProj(u1,v2,R,r,rotX,rotY);
        ctx.beginPath();
        ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy);
        ctx.lineTo(c2.sx,c2.sy); ctx.lineTo(d.sx,d.sy);
        ctx.closePath(); ctx.fillStyle='#0a2030'; ctx.fill();
      }
    }
    ctx.globalAlpha=1;

    // Draw full winding path
    ctx.beginPath();
    allPts.forEach((pt,i) => i===0 ? ctx.moveTo(pt.sx,pt.sy) : ctx.lineTo(pt.sx,pt.sy));
    ctx.strokeStyle='#0f84'; ctx.lineWidth=2; ctx.stroke();

    // Fade in beat annotations
    beatAlpha = Math.min(1, beatAlpha + 0.01);

    // Outer 30° arc
    const A=20;
    ctx.beginPath();
    for(let k=0;k<=A;k++){
      const a=(k/A)*(Math.PI/6);
      const pr=torusProj(a,0,R+r*1.3,0.01,rotX,rotY);
      k===0?ctx.moveTo(pr.sx,pr.sy):ctx.lineTo(pr.sx,pr.sy);
    }
    ctx.strokeStyle=`rgba(255,160,0,${beatAlpha})`; ctx.lineWidth=3.5; ctx.stroke();
    const mp=torusProj(Math.PI/12,0,R+r*1.8,0.01,rotX,rotY);
    ctx.globalAlpha=beatAlpha;
    ctx.fillStyle='#fa0'; ctx.font='bold 14px Courier New';
    ctx.fillText('30°',mp.sx-10,mp.sy);
    ctx.globalAlpha=1;

    // Inner 24° arc
    ctx.beginPath();
    for(let k=0;k<=A;k++){
      const a=(k/A)*(Math.PI*24/180);
      const pr=torusProj(a,Math.PI,R-r*1.3,0.01,rotX,rotY);
      k===0?ctx.moveTo(pr.sx,pr.sy):ctx.lineTo(pr.sx,pr.sy);
    }
    ctx.strokeStyle=`rgba(0,248,0,${beatAlpha})`; ctx.lineWidth=3.5; ctx.stroke();
    const mp2=torusProj(Math.PI*12/180,Math.PI,R-r*1.9,0.01,rotX,rotY);
    ctx.globalAlpha=beatAlpha;
    ctx.fillStyle='#0f8'; ctx.font='bold 14px Courier New';
    ctx.fillText('24°',mp2.sx-10,mp2.sy);

    // Beat label
    ctx.fillStyle='#f0f'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
    ctx.fillText('6° = π/30',cx, cy+sc*1.1);
    ctx.fillStyle='#888'; ctx.font='10px Courier New';
    ctx.fillText('same p, different arc lengths → beat',cx, cy+sc*1.1+18);
    ctx.textAlign='left';
    ctx.globalAlpha=1;

    // Formula emergence
    ctx.fillStyle=`rgba(255,255,255,${beatAlpha})`;
    ctx.font='11px Courier New'; ctx.textAlign='center';
    ctx.fillText('outer: p×t × (R+r)/R  →  30°', cx, cy - sc*0.88);
    ctx.fillText('inner: p×t × (R-r)/R  →  24°', cx, cy - sc*0.88 + 18);
    ctx.fillText('beat:  p×t × 2r/R     →   6° = π/30', cx, cy - sc*0.88 + 36);
    ctx.textAlign='left';

    document.getElementById('beat_line').textContent =
      'outer 30° − inner 24° = 6° = π/30 → mod-30';
  }

  t += 0.5;
  requestAnimationFrame(draw);
}

// Start at phase 0
setPhase(0);
draw();
</script>
</body>
</html>
